<template>
    <lightning-card title="Customer Onboarding" icon-name="standard:account">
        <div class="slds-p-around_medium">
            <lightning-layout multiple-rows>
                <lightning-layout-item size="12" padding="around-small">
                    <lightning-input
                        label="Company Name"
                        value={companyName}
                        onchange={handleCompanyName}
                        required>
                    </lightning-input>
                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                    <lightning-combobox
                        label="Country Code"
                        value={countryCode}
                        options={countryOptions}
                        onchange={handleCountryCode}
                        required>
                    </lightning-combobox>
                </lightning-layout-item>

                <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                    <lightning-input
                        label="Website (optional)"
                        value={website}
                        onchange={handleWebsite}
                        placeholder="e.g. acme.co.nz">
                    </lightning-input>
                </lightning-layout-item>

                <lightning-accordion class="slds-m-top_small" allow-multiple-sections-open>
                    <lightning-accordion-section name="primaryContact" label="Primary Contact">
                        <lightning-layout multiple-rows>
                            <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                                <lightning-input
                                    label="First Name"
                                    value={contactFirstName}
                                    onchange={handleContactFirstName}>
                                </lightning-input>
                            </lightning-layout-item>

                            <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                                <lightning-input
                                    label="Last Name"
                                    value={contactLastName}
                                    onchange={handleContactLastName}
                                    required>
                                </lightning-input>
                            </lightning-layout-item>

                            <lightning-layout-item size="12" medium-device-size="6" padding="around-small">
                                <lightning-input
                                    type="email"
                                    label="Email"
                                    value={contactEmail}
                                    onchange={handleContactEmail}
                                    placeholder="e.g. jane.doe@acme.co.nz">
                                </lightning-input>
                            </lightning-layout-item>
                        </lightning-layout>
                    </lightning-accordion-section>
                </lightning-accordion>

                <lightning-layout-item size="12" padding="around-small" class="slds-m-top_small">
                    <div class="slds-grid slds-wrap slds-grid_align-end slds-gap_small">
                        <lightning-button
                            variant="neutral"
                            label="Reset"
                            onclick={handleReset}
                            disabled={isLoading}>
                        </lightning-button>

                        <lightning-button
                            variant="brand"
                            label="Onboard"
                            onclick={handleOnboard}
                            disabled={disableSubmit}>
                        </lightning-button>
                    </div>
                </lightning-layout-item>
            </lightning-layout>

            <template if:true={isLoading}>
                <div class="slds-m-top_medium slds-align_absolute-center">
                    <lightning-spinner alternative-text="Onboarding..." size="medium"></lightning-spinner>
                </div>
            </template>

            <template if:true={result}>
                <div class="slds-m-top_medium result-panel slds-p-around_medium slds-box">
                    <div class="slds-text-heading_small">
                        Result:
                        <template if:true={executionTime}>
                            <span> {executionTime}s.</span>
                        </template>
                    </div>

                    <template if:true={result.accountId}>
                        <div class="slds-m-top_x-small">
                            Account:
                            <a href="javascript:void(0)" onclick={navigateToAccount}>
                                {result.accountId}
                            </a>
                        </div>
                    </template>

                    <template if:true={result.contactId}>
                        <div class="slds-m-top_x-small">
                            Contact:
                            <a href="javascript:void(0)" onclick={navigateToContact}>
                                {result.contactId}
                            </a>
                        </div>
                    </template>

                    <template if:true={hasMessages}>
                        <ul class="slds-m-top_small slds-list_dotted">
                            <template for:each={result.messages} for:item="msg">
                                <li key={msg}>{msg}</li>
                            </template>
                        </ul>
                    </template>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
